# slide_diagram_guide.yaml
# 슬라이드 디자인 + 도식화 방법론 통합 지침 — LLM 시스템 프롬프트용
# DAY1COMPANY | ver 1.1
# 구조: design(디자인 규칙) + principles(작업 원칙) + message_types(유형별 통합 규칙) + global_validation

meta:
  purpose: >
    파워포인트 슬라이드 작성 시, 메시지 유형에 따라 적절한 도식을 선택하고
    올바르게 배치·검증하기 위한 규칙셋이다.
    이 파일은 LLM 시스템 프롬프트로 주입되는 것을 전제로 작성되었다.
    디자인 규칙(색상·타이포·레이아웃)과 도식화 방법론이 이 파일 하나에 통합되어 있다.
  version: "1.2"
  scope: "DAY1COMPANY 내부 슬라이드 전용"
  layout_files:
    core:
      - "./diagram_layouts/layout_list.yaml          # 목록: 박스그리드/수직목록/아이콘행 (3종)"
      - "./diagram_layouts/layout_process.yaml       # 프로세스: 가로흐름/분기/타임라인/로드맵/번호목록 (5종)"
      - "./diagram_layouts/layout_hierarchy.yaml     # 위계: 트리/조직도/들여쓰기/중첩박스 (4종)"
      - "./diagram_layouts/layout_comparison.yaml    # 비교: Before-After/2열/매트릭스/옵션비교표 (4종)"
      - "./diagram_layouts/layout_relationship.yaml  # 관계: 사이클/벤/네트워크/방사형 (4종)"
      - "./diagram_layouts/layout_data.yaml          # 데이터: 8종 차트 + 공통규칙"
      - "./diagram_layouts/layout_before_after.yaml  # Before/After 상세: 6가지 구조"
    extended:
      - "./diagram_layouts/layout_hierarchy_shape.yaml  # 형태적 위계: 피라미드/펀넬/계단형 (3종)"
      - "./diagram_layouts/layout_scorecard.yaml        # 스코어카드: KPI테이블/카드형/진행률/신호등 (4종)"
      - "./diagram_layouts/layout_option_compare.yaml   # 옵션비교: 전체매트릭스/카드형/가중점수 (3종)"
      - "./diagram_layouts/layout_process_roadmap.yaml  # 로드맵: 간트/수직단계/타일형 (3종)"

design:
  # ── 기본 정보 ──────────────────────────────
  canvas:
    ratio: "16:9"
    width: '10"'
    height: '5.625"'
    font_family: "Noto Sans KR"

  # ── 색상 체계 ──────────────────────────────
  colors:
    dark_bg:       { hex: "#1A1A1A", use: "다크 슬라이드 배경 / 강조 노드 배경 / 테두리" }
    white_bg:      { hex: "#FFFFFF", use: "콘텐츠 슬라이드 배경 / 다크 배경 위 본문 텍스트" }
    box_bg:        { hex: "#D9D9D9", use: "콘텐츠 박스 배경 / 보조 노드 배경" }
    text_on_dark:  { hex: "#FFFFFF", use: "다크 배경 위 본문 텍스트" }
    text_on_white: { hex: "#1A1A1A", use: "화이트 배경 위 본문 텍스트" }
    sub_on_dark:   { hex: "#BBBBBB", use: "다크 배경 위 보조 텍스트. 정말 중요하지 않은 텍스트·레퍼런스·주석에만 제한 사용." }
    sub_on_white:  { hex: "#555555", use: "화이트 배경 위 보조 텍스트. 정말 중요하지 않은 텍스트·레퍼런스·주석에만 제한 사용." }
    caption:       { hex: "#808080", use: "예시·캡션·주석 텍스트 전용. 일반 본문에 사용 금지." }
    accent:        { hex: "#CC3333", use: "강조색. 제거 표시(✕)·수치 강조에만 제한적 사용. 넘버링에 사용 금지." }

  # ── 타이포그래피 ───────────────────────────
  typography:
    slide_title_dark:  { font: "Noto Sans KR Black", size: "26~35pt", weight: "Bold" }
    slide_title_white: { font: "Noto Sans KR Black", size: "22pt",    weight: "Bold" }
    body_emphasis:     { font: "Noto Sans KR",       size: "15~16pt", weight: "Bold" }
    body_regular:      { font: "Noto Sans KR",       size: "14~15pt", weight: "Regular" }
    box_title:         { font: "Noto Sans KR Black", size: "13~15pt", weight: "Bold" }
    box_body:          { font: "Noto Sans KR",       size: "11~13pt", weight: "Regular" }
    caption:           { font: "Noto Sans KR",       size: "9~10pt",  weight: "Regular", style: "Italic, 회색(#808080)" }
    insight_line:      { font: "Noto Sans KR",       size: "11pt",    weight: "Bold",    prefix: "=>" }

  # ── 슬라이드 유형 ──────────────────────────
  slide_types:
    dark:
      when: "타이틀 / 핵심 메시지 / 전환점 / 클로징"
      bg: "#1A1A1A"
      text: "#FFFFFF"
      sub_text: "#BBBBBB"
      layout: "좌측 정렬, 수직 중앙"
      margin_left: '0.7"'
      content_width: '8.6"'
      line_height: "1.3배"
    white:
      when: "데이터 / 상세 설명 / 도식"
      bg: "#FFFFFF"
      title_position: 'y: 0.4", h: 1.1"'
      title_style: "22pt Bold, #1A1A1A"
      body_start_y: '1.65"'
      margin_left: '0.7"'
      content_width: '8.6"'
    inverted:
      when: "다크 슬라이드 직후 배치하여 대비 효과"
      bg: "#FFFFFF"
      text: "#1A1A1A"
      sub_text: "#555555"
      note: "레이아웃·텍스트 크기·위치는 다크 슬라이드와 동일. 배경·텍스트 색만 반전."
    blank_demo:
      when: "프레젠테이션 중 별도 화면 시연 시"
      bg: "#FFFFFF"
      content: "제목만 표시 (예: 'Case 1 : 예시'). 본문 없음."

  # ── 공간 배치 시스템 ──────────────────────────
  spacing_system:

    # ─ 슬라이드 존(Zone) 그리드 ─
    # 모든 화이트 슬라이드는 이 3개 존으로 구성된다.
    # Y좌표는 고정값이며, 범위 대신 이 값을 사용한다.
    zones:
      title:
        y: '0.40"'
        height: '1.10"'
        description: "Action Title 영역. 모든 화이트 슬라이드에서 동일 위치."
      content:
        y: '1.65"'
        max_bottom: '4.45"'
        max_height: '2.80"'
        description: "도식·본문 영역. 콘텐츠 종류에 따라 높이가 달라지나 시작 Y는 고정."
      summary:
        y: '4.35"'
        height: '0.40"'
        description: "하단 요약 박스 (선택). 인사이트 라인 위에 배경 박스로 핵심 메시지 강조."
        when: "콘텐츠 영역 아래에 1줄 요약이 필요한 경우에만 사용"
      insight:
        y: '4.85"'
        height: '0.35"'
        description: "=> 인사이트 라인. 모든 화이트 슬라이드에서 동일 위치."

    # ─ 간격 스케일 ─
    # 요소 간 거리에는 반드시 이 스케일의 값만 사용한다.
    # 임의의 값(예: 0.13", 0.27")은 사용 금지.
    scale:
      xxs: { value: '0.04"', use: "같은 그룹 내 밀착 요소 (라벨↔구분선, 넘버링↔텍스트)" }
      xs:  { value: '0.08"', use: "카드 내부 상단 패딩 (카드 테두리 → 첫 텍스트)" }
      sm:  { value: '0.10"', use: "카드 간 간격 (4개 이상 배치), 구분선 위아래 여백, 카드 내부 좌우 패딩" }
      md:  { value: '0.15"', use: "카드 간 간격 (3개 배치), 카드 내부 좌우 패딩 (넓은 카드)" }
      lg:  { value: '0.20"', use: "카드 간 간격 (2개 배치), 섹션 간 최소 여백, 흐름도 행 간격" }
      xl:  { value: '0.30"', use: "카드 제목 → 본문 간격, 큰 섹션 간 분리" }
      xxl: { value: '0.46"', use: "존(zone) 간 전환 간격 (제목 존 → 콘텐츠 존 등)" }

    # ─ 등분 배치 공식 ─
    # N개의 동일 크기 요소를 가로로 배치할 때 사용한다.
    # content_width(8.60")를 기준으로 자동 계산한다.
    equal_distribution:
      formula: "card_width = (content_width - (N - 1) × gap) / N"
      content_width: '8.60"'
      start_x: '0.70"'
      presets:
        2: { card_width: '4.20"', gap: '0.20"', note: "2분할. 좌우 균등." }
        3: { card_width: '2.73"', gap: '0.20"', note: "3분할. 표준 카드 배치." }
        4: { card_width: '2.05"', gap: '0.10"', note: "4분할. 사례 비교 등." }
        5: { card_width: '1.62"', gap: '0.10"', note: "5분할. 최소 카드 폭. 5개 초과 시 슬라이드 분리." }
      max_items: 5
      forbidden: "6개 이상의 가로 등분 배치. 5개 초과 시 반드시 슬라이드를 분리하거나 2행으로 전환."

    # ─ 카드 내부 레이아웃 ─
    # 배경 박스(카드) 안에 텍스트를 배치할 때의 규칙이다.
    card_internal:
      padding:
        top: '0.08"'
        bottom: '0.10"'
        left: '0.10"'
        right: '0.10"'
        note: "넓은 카드(폭 3.5\" 이상)는 좌우 패딩을 0.15\"로 확대 가능"
      spacing:
        label_to_title: '0.05"'
        title_to_body: '0.25"'
        body_line_gap: '0.02"'
        separator_margin: '0.07"'
        description: |
          - label_to_title: 유형 라벨(예: "유형 1") → 카드 제목 사이
          - title_to_body: 카드 제목 → 본문 텍스트 사이
          - body_line_gap: 본문 텍스트 줄 간격 (line spacing과 별도)
          - separator_margin: 구분선(0.5pt) 위아래 여백
      text_overflow:
        strategy: "폰트 축소 우선"
        rules: |
          1. 텍스트가 카드 영역을 초과하면: 폰트 크기를 1pt씩 축소 (최소 9pt까지)
          2. 9pt에서도 초과하면: 텍스트를 줄여서 핵심 키워드만 남긴다
          3. 카드 높이를 늘리는 것은 같은 행의 다른 카드와 높이가 달라지므로 금지
        forbidden:
          - "같은 행의 카드들이 서로 다른 높이를 갖는 배치"
          - "9pt 미만의 텍스트"
          - "텍스트가 카드 밖으로 넘치는 상태로 방치"

    # ─ 흐름도 노드 규격 ─
    flow_node:
      height: '0.38"'
      min_width: '0.80"'
      max_width: '1.50"'
      arrow_width: '0.30"'
      arrow_style: "→ 텍스트, 14pt Bold"
      gap_between_nodes: '0.00"'
      description: |
        노드와 화살표가 빈틈 없이 이어진다.
        노드 폭은 내부 텍스트 길이에 따라 min~max 범위에서 조정.
        같은 흐름도 내 모든 노드는 동일한 높이(0.38")를 사용한다.

    # ─ 다크 슬라이드 존 그리드 ─
    dark_zones:
      main_text:
        y: '1.40"'
        height: '1.80"'
        description: "핵심 메시지 텍스트. 좌측 정렬, 수직 중앙."
      sub_text:
        y: '3.40"'
        height: '0.40"'
        description: "부제목 또는 보조 설명."
      meta:
        y: '4.60"'
        height: '0.35"'
        description: "발표자, 날짜 등 메타 정보."

  # ── 콘텐츠 박스 ────────────────────────────
  content_box:
    default:
      bg: "#D9D9D9"
      border: "#1A1A1A 0.5pt"
      padding: '0.10"'
      title: "13~15pt Bold"
      body: "11~13pt Regular"
      text_align:
        title:
          vertical: "중앙 (상하 가운데)"
          horizontal: "중앙 (좌우 가운데)"
          when: "박스 제목, 노드 레이블, 단일 키워드처럼 완결되지 않은 짧은 텍스트"
        sentence:
          vertical: "중앙 (상하 가운데)"
          horizontal: "좌측 정렬"
          when: "완결된 문장, 설명 텍스트, 2줄 이상의 본문"
        note: "도식화 요소 내 박스(흐름도 노드, Before/After 박스 등)에도 동일 규칙 적용"
    dark_box:
      bg: "#1A1A1A"
      border: "#1A1A1A 0.5pt"
      text: "#FFFFFF"
      when: "3박스 배치에서 강조할 항목 1개에 한해 사용"
    layout:
      note: "등분 배치는 design.spacing_system.equal_distribution 참조"
      two_box:   { width_each: '4.20"', gap: '0.20"', start_y: '1.65"', height: '2.80"' }
      three_box: { width_each: '2.73"', gap: '0.20"', start_y: '1.65"', height: '2.80"' }
      four_box:  { width_each: '2.05"', gap: '0.10"', start_y: '1.65"', height: '2.80"' }
      five_box:  { width_each: '1.62"', gap: '0.10"', start_y: '1.65"', height: '2.80"' }

  # ── 레이아웃 원칙 ──────────────────────────
  layout:
    one_slide_one_message: "한 슬라이드에 하나의 메시지만 담는다. 메시지가 두 개 이상이면 슬라이드를 분리한다."
    dark_white_alternation: |
      - 핵심 메시지·전환점 → 다크 슬라이드
      - 데이터·상세 설명 → 화이트 슬라이드
      - 같은 배경을 연속 3장 이상 사용하지 않는다
    text_hierarchy:
      rule: >
        텍스트 크기의 위계는 중요도의 위계와 동일하다.
        같은 레벨의 중요도를 가진 요소는 슬라이드 전체에서 반드시 동일한 크기를 사용한다.
        (예: 같은 중제목이라면 슬라이드가 달라도 크기가 같아야 한다.)
      levels: |
        - 슬라이드 제목 (최상위): design.typography.slide_title_dark / slide_title_white
        - 본문 강조 / 중제목: design.typography.body_emphasis (15~16pt Bold)
        - 본문 일반: design.typography.body_regular (14~15pt Regular)
        - 박스 제목: design.typography.box_title (13~15pt Bold)
        - 박스 본문: design.typography.box_body (11~13pt Regular)
        - 보조/예시/캡션: design.typography.caption (9~10pt Italic, 회색)
      forbidden:
        - "같은 레벨의 요소에 서로 다른 크기 사용 (예: 두 중제목의 pt가 다른 경우)"
        - "중요도가 낮은 요소가 더 높은 레벨보다 크거나 굵은 경우"
    section_separation:
      rule: >
        타이틀이 있는 섹션은 동일 레벨의 다른 섹션과 시각적으로 명확히 구분되어야 한다.
        어떤 도식화 방식을 사용하든 이 원칙은 예외 없이 적용된다.
      methods: |
        - 섹션 간 여백: 최소 0.2" 이상
        - 배경색 분리: 섹션 배경에 `#D9D9D9` 박스 적용 또는 섹션 제목 Bold 처리
        - 구분선: 필요 시 0.5pt `#1A1A1A` 수평선 사용 가능
      forbidden:
        - "동일 레벨 섹션의 타이틀·콘텐츠가 공간적으로 겹치는 배치"
        - "섹션 간 여백 없이 콘텐츠가 연속으로 이어지는 배치"
        - "동일 레벨 섹션인데 타이틀 크기·굵기가 다른 경우 (중요도 위계 원칙 위반)"
    conclusion:
      level: "headline과 동일한 메시지 레벨"
      style: |
        - 텍스트 크기: headline과 유사한 수준 (슬라이드 제목보다 작거나 같게)
        - 텍스트 색상: headline과 동일한 색상 계열 적용
          (다크 슬라이드: #FFFFFF / 화이트 슬라이드: #1A1A1A)
        - 결론임을 나타내는 시각적 구분(예: `=>` 접두어 또는 Bold)은 유지하되,
          크기·색상은 headline과 동급 처리
      forbidden:
        - "결론 텍스트에 회색(#555555, #808080 등) 사용"
        - "결론 텍스트가 headline보다 현저히 작거나 연한 경우"
    insight_line:
      prefix: "=>"
      weight: "Bold"
      position: 'y: 4.85" (슬라이드 하단, design.spacing_system.zones.insight 참조)'
      rule: "해당 슬라이드의 핵심 takeaway를 한 줄로. Action Title과 같은 메시지를 다른 표현으로 강화. 새 메시지 추가 금지."

  # ── 사용 금지 요소 ─────────────────────────
  forbidden:
    - "넘버링에 빨간색(#CC3333) 사용 → 검정(#1A1A1A) 사용"
    - "제목 아래 악센트 라인"
    - "유니코드 불릿(•)"
    - "이모지"
    - "그라데이션 배경"
    - "3D 효과 / 그림자"
    - "회색 텍스트(#555555, #808080, #BBBBBB)를 일반 본문·설명·레이블에 사용 → 검정(#1A1A1A) 사용. 회색은 레퍼런스·주석·캡션에만 허용."

principles:
  message_first: >
    **도식 선택 전에 반드시 Action Title을 먼저 완성한다.**
    제목은 "~이다 / ~했다 / ~가 필요하다"처럼 결론을 서술하는 문장이어야 한다.
    주제어("현황", "개요", "분석")만 있는 제목은 결론 문장으로 수정 후 진행한다.
  one_slide_one_message: >
    한 슬라이드에 메시지 유형이 두 개 이상 혼재하면 슬라이드를 분리한다.
  diagram_as_evidence: >
    도식은 Action Title의 결론을 시각적으로 증명하는 수단이다.
    도식을 먼저 고른 뒤 제목을 붙이는 순서는 금지한다.
  sop:
    description: "슬라이드 작성 시 반드시 이 순서를 따른다."
    steps:
      - step: 1
        action: "Action Title 확정"
        detail: "전달할 결론 한 문장 작성. 주제어가 아닌 서술 문장."
      - step: 2
        action: "슬라이드 유형 결정"
        detail: "핵심 메시지·전환점 → dark. 데이터·상세 설명·도식 → white. design.slide_types 참조."
      - step: 3
        action: "메시지 유형 분류"
        detail: "아래 message_types 중 하나로 분류. 복수 유형이면 슬라이드 분리."
      - step: 4
        action: "도식 유형 선택"
        detail: "해당 유형의 diagram.primary를 우선 선택. 제약 시 diagram.fallback."
      - step: 5
        action: "실행 규칙 적용"
        detail: "해당 유형의 execution 규칙 + design 섹션의 색상·타이포·레이아웃 규칙 적용."
      - step: 6
        action: "검증 실행"
        detail: "해당 유형의 validation + global_validation 체크리스트 순서대로 확인."
      - step: 7
        action: "하단 인사이트 작성"
        detail: |
          `=>` 접두어 + Bold. 슬라이드 하단 y: 4.85".
          Action Title과 같은 메시지를 다른 표현으로 강화한다.
          인사이트가 제목과 모순되거나 새로운 메시지를 추가하면 금지.

message_types:

  # ────────────────────────────────────────────
  # 1. 목록 (List)
  # ────────────────────────────────────────────
  list:
    description: "항목들이 독립적으로 나열되며, 순서나 위계가 없다."
    layout_ref: "./diagram_layouts/layout_list.yaml"
    title_example: "AI 전환의 핵심 원칙은 3가지다"
    trigger_signals:
      - "항목들이 병렬 관계다"
      - "순서를 바꿔도 의미가 달라지지 않는다"
      - "항목 간 상하 종속이 없다"

    diagram:
      primary: "박스 나열형 (항목 3개 이하) 또는 수직 목록형 (항목 4개 이상)"
      fallback: "아이콘 그리드"
      forbidden:
        - condition: "항목 4개 이상을 박스 가로 나열"
          alternative: "수직 목록으로 전환"

    execution:
      box_layout:
        description: "항목 2~3개일 때 사용. design.content_box.layout 치수 적용."
        two_box:
          width_each: '4.0"'
          gap: '0.2"'
          start_y: '1.6~1.7"'
        three_box:
          width_each: '2.7"'
          gap: '0.15"'
          start_y: '1.6~1.7"'
        style: |
          - 배경: `#D9D9D9`, 테두리: `#1A1A1A` 0.5pt, 내부 패딩: `0.25"`
          - 박스 제목: 13~15pt Bold (design.typography.box_title)
          - 박스 본문: 11~13pt Regular (design.typography.box_body)
          - 강조 박스 1개에 한해 다크 박스(`#1A1A1A` 배경, 흰 텍스트) 적용 가능
      vertical_list:
        description: "항목 4개 이상일 때 사용"
        style: |
          - 번호 또는 대시(-)로 항목 구분
          - 항목당 최대 1줄. 보조 설명은 들여쓰기 후 `#555555` 색상으로 작게.
          - 항목 간 간격: 0.1~0.15"

    validation:
      - "항목들이 실제로 독립적인가? 순서 의존성이 있으면 → 프로세스 유형으로 재분류"
      - "박스가 3개를 초과하지 않는가?"
      - "항목 간 병렬성이 유지되는가? (항목끼리 추상도 수준이 다르면 재구성)"

  # ────────────────────────────────────────────
  # 2. 프로세스 (Process)
  # ────────────────────────────────────────────
  process:
    description: "단계가 순서대로 진행되며, 이전 단계가 다음 단계에 영향을 준다."
    layout_ref: "./diagram_layouts/layout_process.yaml"
    title_example: "PODO 온보딩은 4단계 순서로 진행된다"
    trigger_signals:
      - "순서를 바꾸면 의미가 달라진다"
      - "'다음', '이후', '완료되면' 같은 시간·순서 표현이 포함된다"
      - "각 단계가 다음 단계의 입력이 된다"

    diagram:
      primary: "가로 흐름도 (단계 2~4개)"
      fallback: "세로 흐름도 또는 번호 목록 (단계 5개 이상) / 타임라인 (날짜·기간이 핵심)"
      branch: "플로우차트 (분기가 있을 때)"
      forbidden:
        - condition: "단계 수 5개 이상을 가로 흐름도로 표현"
          reason: "가독성 붕괴"
          alternative: "세로 또는 번호 목록"

    execution:
      horizontal_flow:
        description: "단계 2~4개"
        node_style: |
          - 도형: 사각형 박스, 높이 0.5"
          - 폭: 단계 수에 따라 균등 분배
          - 일반 노드: 흰색 배경 / 검정 텍스트 / 검정 테두리
          - 보조 노드: `#D9D9D9` 배경
          - 최종 단계 또는 강조 노드: `#1A1A1A` 배경 / 흰 텍스트
        connector: '`→` 텍스트, 14pt Bold'
      branch_flowchart:
        branch_node: "마름모(◇) 도형"
        label: "Yes/No 또는 조건 레이블을 화살표 옆에 명시"
        limit: "한 슬라이드에 분기점 최대 2개. 초과 시 슬라이드 분리."
      timeline:
        when: "날짜·기간이 메시지의 핵심일 때"
        style: |
          - 수평 기준선 위에 이벤트를 상하 교차 배치
          - 날짜: 기준선 아래 / 이벤트 설명: 기준선 위
          - 현재 시점 있으면 수직 강조선으로 표시

    validation:
      - "단계 순서를 바꾸면 의미가 달라지는가? 아니면 → 목록 유형으로 재분류"
      - "단계 수가 4개 이하인 경우 가로 흐름도를 사용했는가?"
      - "분기가 있으면 마름모 도형을 사용했는가?"

  # ────────────────────────────────────────────
  # 3. 위계 (Hierarchy)
  # ────────────────────────────────────────────
  hierarchy:
    description: "항목들이 상하 종속 관계를 가진다."
    layout_ref: "./diagram_layouts/layout_hierarchy.yaml"
    title_example: "조직은 3개 BU와 그 하위 팀으로 구성된다"
    trigger_signals:
      - "상위 항목이 하위 항목을 포함하거나 제어한다"
      - "'하위', '산하', '속한다' 같은 종속 표현이 포함된다"
      - "항목들이 트리 구조로 나타낼 수 있다"

    diagram:
      primary: "트리 다이어그램"
      fallback: "들여쓰기 텍스트 / 조직도 (인원 조직일 때)"
      forbidden:
        - condition: "4단계 이상 위계를 한 슬라이드에 표현"
          alternative: "슬라이드 분리 또는 일부 생략"

    execution:
      style: |
        - 루트(최상위) 노드: 슬라이드 상단 중앙, `#1A1A1A` 배경, 흰 텍스트
        - 하위 노드: `#D9D9D9` 배경, 검정 텍스트
        - 연결선: 수직/수평 꺾인 선, 0.5pt, `#1A1A1A`
        - 같은 레벨의 노드는 동일 y좌표에 균등 배치
        - 최대 3단계까지만 한 슬라이드에 표현

    validation:
      - "항목 간 관계가 실제로 상하 종속인가? 병렬 관계라면 → 목록 유형으로 재분류"
      - "단계가 3단계 이하인가?"
      - "같은 레벨의 노드가 동일 y좌표에 정렬되어 있는가?"

  # ────────────────────────────────────────────
  # 4. 비교 (Comparison)
  # ────────────────────────────────────────────
  comparison:
    description: "둘 이상의 항목이 특정 기준에서 차이를 보인다."
    layout_ref: "./diagram_layouts/layout_comparison.yaml"
    title_example: "도입 전과 후의 업무량이 40% 차이 난다"
    trigger_signals:
      - "두 상태·옵션·시점을 나란히 놓고 차이를 보여준다"
      - "'vs', '대비', '이전/이후', 'Before/After' 표현이 포함된다"
      - "수치 차이를 강조한다"

    diagram:
      primary: "Before/After 도식 (2개 상태 비교) 또는 좌우 2열 박스"
      fallback: "2×2 매트릭스 (4분면 전략 비교) / 막대 차트 (수치 차이 강조)"
      forbidden:
        - condition: "비교 기준(축)이 불명확한 2×2 매트릭스"
          alternative: "목록 또는 비교 테이블"
        - condition: "4분면 중 2개 이상이 비어있는 2×2 매트릭스"
          alternative: "목록 또는 비교 테이블"

    execution:
      before_after:
        description: >
          상황에 따라 6가지 레이아웃(A~F) 중 하나를 선택한다.
          레이아웃 상세 정의 및 선택 기준은 아래 파일을 참조한다.
        layout_ref: "./diagram_layouts/layout_before_after.yaml"
        selection_summary:
          F_delta:    "변경 항목 1~2개, 나머지 유지"
          E_stack:    "흐름 유지, 노드만 교체 (3~4단계)"
          A_swimlane: "역할/담당자 단위 책임 이동"
          C_gap:      "프로세스 전체 재설계"
          B_bridge:   "변화 요인(why) 설명 필요"
          D_table:    "항목 5개 이상, 상세 대응 필요"
        common_node_rules:
          text_align:
            title:    "상하좌우 가운데 정렬"
            sentence: "상하 가운데 정렬 + 좌측 정렬"
          node_types:
            kept:    "흰색 배경 / #1A1A1A 텍스트 / #1A1A1A 테두리 0.5pt"
            removed: "#D9D9D9 배경 / 취소선 텍스트 / #1A1A1A 텍스트"
            new_ai:  "#1A1A1A 배경 / #FFFFFF 텍스트"
          connector: "`→` 텍스트, 14pt Bold, #1A1A1A"
          forbidden:
            - "✕ 아이콘 사용 → 취소선 텍스트로 대체"
            - "Before/After 라벨에 회색 텍스트 → #1A1A1A Bold 사용"
            - "3개 이상 박스를 가로 flow로 구성"
      two_column_box:
        description: "기준별로 두 항목을 나란히 비교"
        style: |
          - 좌측: 비교 대상 A / 우측: 비교 대상 B
          - 열 너비 각 4.0", 간격 0.2"
          - 비교 기준: 같은 행에 동일 기준으로 정렬
          - 우위가 명확한 항목의 셀에 `#1A1A1A` 배경 강조 가능
      matrix_2x2:
        description: "전략적 포지셔닝 비교"
        style: |
          - X축·Y축 각각에 대립되는 두 기준 배치
          - 4개 사분면 각각에 항목 또는 전략 배치
          - 축 레이블: 10pt Bold, 축 끝에 배치
          - 핵심 사분면 1개에만 `#1A1A1A` 배경 강조 가능

    validation:
      - "비교 기준(공통 축)이 명확하게 설정되어 있는가?"
      - "Before/After 도식에서 제거 노드에 ✕ 빨간색 + 취소선이 적용되었는가?"
      - "AI/신규 대체 노드에 #1A1A1A 배경이 적용되었는가?"
      - "2×2 매트릭스 사용 시 4분면이 모두 채워져 있는가?"

  # ────────────────────────────────────────────
  # 5. 관계 (Relationship)
  # ────────────────────────────────────────────
  relationship:
    description: "항목들이 겹치거나 연결되며, 상호 영향을 준다."
    layout_ref: "./diagram_layouts/layout_relationship.yaml"
    title_example: "전략, 실행, 성과는 서로 연결된 순환 구조다"
    trigger_signals:
      - "항목들이 서로 영향을 주고받는다"
      - "순환·피드백 구조가 있다"
      - "겹치는 영역에 의미가 있다"

    diagram:
      primary: "사이클 다이어그램 (순환 구조) / 연결선 다이어그램 (네트워크)"
      fallback: "벤 다이어그램 (겹침 강조) / 방사형 (중심-주변 구조)"
      forbidden:
        - condition: "벤 다이어그램에 원 4개 이상"
          alternative: "연결선 다이어그램"
        - condition: "겹치는 내용이 불명확한 벤 다이어그램"
          alternative: "연결선 다이어그램"

    execution:
      cycle:
        description: "순환 구조"
        style: |
          - 원형 배치, 노드 3~5개
          - 화살표 방향: 시계 방향 기본
          - 노드 배경: `#D9D9D9` / 강조 노드 1개에 `#1A1A1A` 적용 가능
      venn:
        description: "겹침 강조"
        style: |
          - 원 2~3개 (3개 초과 금지)
          - 겹치는 영역에 핵심 키워드만 배치
          - 원 배경: 반투명 / 색상은 중립 계열 사용
      network:
        description: "항목 간 다대다 연결"
        style: |
          - 중심 노드가 있으면 중앙 배치
          - 연결선 굵기로 관계 강도 표현 가능 (0.5pt 기본, 강조 1.5pt)

    validation:
      - "관계가 실제로 상호적인가? 일방향이면 → 프로세스 유형으로 재분류"
      - "사이클 도식에서 노드 수가 3~5개인가?"
      - "벤 다이어그램에서 원이 3개 이하인가?"

  # ────────────────────────────────────────────
  # 6. 데이터 (Data)
  # ────────────────────────────────────────────
  data:
    description: "수치가 핵심이며, 수치 간의 패턴이나 크기를 보여주는 것이 목적이다."
    layout_ref: "./diagram_layouts/layout_data.yaml"
    title_example: "3분기 매출은 전분기 대비 18% 증가했다"
    trigger_signals:
      - "수치 자체가 메시지의 근거다"
      - "크기·변화·비율·분포를 보여준다"
      - "데이터 포인트가 2개 이상이다"

    chart_selection:
      - intent: "크기 비교 / 순위"
        chart: "가로 막대 차트"
        condition: "항목 간 크기 비교. 항목명이 길면 가로 방향이 유리."
      - intent: "시간에 따른 변화"
        chart: "세로 막대 차트 (컬럼)"
        condition: "X축이 시간(월·분기·연도). 데이터 포인트 6개 이하 권장."
      - intent: "장기 추세 / 예측"
        chart: "선형 차트 (Line)"
        condition: "데이터 포인트 7개 이상 또는 연속적 흐름 강조."
      - intent: "전체 대비 비율"
        chart: "파이 / 도넛 차트"
        condition: "항목 수 5개 이하, 합계 100%, 시계열 불가, 항목 간 차이 명확."
      - intent: "단계별 증감 누적"
        chart: "폭포수 차트 (Waterfall)"
        condition: "비용 절감 항목별 분해, 매출 구성 요소 분석 등."
      - intent: "두 변수 간 상관관계"
        chart: "산점도 (Scatter)"
        condition: "데이터 포인트 10개 이상. 이상값 탐지·분포 확인 목적."
      - intent: "여러 기준의 상대적 강도"
        chart: "레이더 차트 (Radar)"
        condition: "기준축 3~8개. 항목 간 강약 패턴 비교."
      - intent: "단일 수치 강조"
        chart: "Big Number 표기"
        condition: "수치 1~3개. 수치 자체가 메시지일 때. 차트 불필요."

    execution:
      common: |
        - 차트 제목은 슬라이드 Action Title과 동일하거나 생략 (차트 내부 별도 제목 불필요)
        - 축 레이블: 10pt, `#555555`
        - 데이터 레이블: 11pt Bold, 막대 끝 또는 내부
        - 범례: 항목 3개 이하면 생략하고 직접 레이블 처리
        - 격자선: 수평만, 0.25pt 이하
        - 강조 데이터 포인트 1개에 한해 `#CC3333` 적용 가능
      big_number:
        number_size: "40~60pt Bold `#1A1A1A`"
        label_size: "14~16pt `#555555`, 수치 아래 배치"
        layout: "수치 1개 → 슬라이드 중앙 / 2~3개 → 균등 가로 배치"
        sub_text: "보조 설명 필요 시 수치 아래 12pt Regular"
      forbidden:
        - "3D 차트, 폭발형 파이 차트, 그라데이션 채우기"
        - "불필요한 범례·테두리·배경색이 있는 플롯 영역"
        - "파이 차트: 항목 6개 이상 또는 항목 간 차이 5% 미만 → 가로 막대 차트로 대체"
        - "선형 차트: 데이터 포인트 6개 이하이고 연속성 강조 불필요 → 세로 막대 차트로 대체"
        - "레이더 차트: 기준축 2개 이하 또는 9개 이상 → 막대 차트 또는 매트릭스로 대체"

    validation:
      - "차트 유형이 chart_selection의 intent와 condition을 모두 만족하는가?"
      - "파이 차트 사용 시 항목 수가 5개 이하이고 항목 간 차이가 명확한가?"
      - "Big Number 사용 시 수치가 3개 이하인가?"
      - "격자선이 수평만 사용되었는가?"

global_validation:
  description: "모든 유형에 공통 적용되는 검증 항목. 유형별 validation 이후 추가 확인."
  checklist:
    message_logic:
      - "Action Title이 결론을 서술하는 문장인가? (주제어만 있으면 실패)"
      - "도식이 Action Title의 결론을 시각적으로 증명하는가?"
      - "도식의 방향·흐름이 Action Title의 논리와 일치하는가?"
    slide_type:
      - "슬라이드 배경 유형(dark/white/inverted)이 design.slide_types 기준에 맞는가?"
      - "같은 배경이 연속 3장 이상 사용되지 않았는가?"
    spacing:
      - "제목 존이 y: 0.40\", h: 1.10\"에 배치되었는가?"
      - "콘텐츠 존이 y: 1.65\"에서 시작하는가?"
      - "인사이트 라인이 y: 4.85\"에 배치되었는가?"
      - "요소 간 간격이 design.spacing_system.scale의 값만 사용하는가? (임의 값 금지)"
      - "같은 행의 카드들이 동일한 높이를 갖는가?"
      - "가로 등분 배치 시 design.spacing_system.equal_distribution.presets의 값을 따르는가?"
      - "카드 내부 패딩이 card_internal 규칙을 따르는가? (상: 0.08\", 좌우: 0.10\", 하: 0.10\")"
      - "텍스트가 카드 영역을 초과하지 않는가? (초과 시 폰트 축소, 최소 9pt)"
    visual_structure:
      - "도식 요소 수가 7개 이하인가? (초과 시 그루핑 또는 슬라이드 분리)"
      - "도형 크기와 간격이 슬라이드 전반에 일관성 있게 유지되는가?"
      - "색상이 design.colors 체계를 따르는가? (#1A1A1A / #D9D9D9 / #CC3333 / #FFFFFF)"
      - "타이포그래피가 design.typography 기준을 따르는가?"
      - "도식 내 텍스트가 요소당 2줄 이내인가?"
      - "마진이 확보되어 있는가? (좌 0.7\", 최소 0.5\" 여백)"
    text_size_consistency:
      - "같은 레벨의 중요도를 가진 요소들이 슬라이드 전체에서 동일한 크기를 사용하는가?"
      - "중요도가 낮은 요소가 상위 레벨 요소보다 크거나 굵지 않은가?"
      - "design.typography의 레벨 정의(body_emphasis/body_regular/box_title 등)를 일관되게 적용했는가?"
    text_alignment:
      - "박스 제목/노드 레이블(짧은 텍스트)은 상하좌우 가운데 정렬이 적용되었는가?"
      - "완결된 문장/설명 텍스트는 상하 가운데 + 좌측 정렬이 적용되었는가?"
      - "도식화 요소 내 박스(흐름도 노드 등)에도 동일한 정렬 규칙이 적용되었는가?"
    section_separation:
      - "타이틀이 있는 섹션이 동일 레벨의 다른 섹션과 시각적으로 구분되어 있는가?"
      - "섹션 간 여백이 최소 0.2\" 이상 확보되어 있는가?"
      - "동일 레벨 섹션의 타이틀·콘텐츠가 공간적으로 겹치지 않는가?"
    forbidden_elements:
      - "그라데이션 / 3D 효과 / 그림자"
      - "이모지 / 유니코드 불릿(•)"
      - "제목 아래 악센트 라인"
      - "넘버링에 빨간색 사용 (검정 사용)"
      - "회색 텍스트를 일반 본문·레이블·설명에 사용 → 검정(#1A1A1A) 사용. 레퍼런스·주석·캡션에만 허용."
    insight_line:
      - '하단 인사이트가 `=>` 접두어 + Bold로 y: 4.85"에 배치되었는가?'
      - "인사이트가 Action Title과 같은 메시지를 강화하는가? (새 메시지 추가 금지)"

# diagram_layouts/hierarchy.yaml
# 위계(Hierarchy) 메시지 유형의 레이아웃 패턴 정의
# 참조 위치: slide_diagram_guide.yaml > message_types.hierarchy
# DAY1COMPANY | ver 1.0

meta:
  message_type: "hierarchy"
  condition: "항목들이 상하 종속 관계를 가진다."

selection_guide:
  decision_axis:
    - question: "사람/팀/조직 단위의 보고 구조인가?"
      answer_yes: "B (조직도)"
    - question: "위계가 2단계이고 루트-리프 구조가 단순한가?"
      answer_yes: "A (트리 다이어그램)"
    - question: "위계가 3단계이고 슬라이드 공간이 충분한가?"
      answer_yes: "A (트리 다이어그램) — 단, 가로 확장 주의"
    - question: "위계가 4단계 이상인가?"
      answer_yes: "슬라이드 분리 또는 C (들여쓰기 텍스트)로 대체"
    - question: "상하 관계보다 포함 관계(A가 B를 포함)가 핵심인가?"
      answer_yes: "D (중첩 박스)"
  forbidden:
    - "4단계 이상 위계를 한 슬라이드에 트리로 표현 → 가독성 붕괴"
    - "병렬 관계를 위계로 표현 → list 유형으로 재분류"

layouts:
  A_tree:
    name: "트리 다이어그램"
    when: "상하 종속 관계. 2~3단계. 루트 1개에서 분기."
    not_when: "4단계 이상, 인원 조직 구조는 B, 포함 관계는 D 사용"
    structure: "루트 노드 상단 중앙, 자식 노드 아래 균등 분기, 손자 노드 최하단"
    execution: |
      - 루트 노드: #1A1A1A 배경, #FFFFFF 텍스트, 슬라이드 상단 중앙
      - 자식 노드: #D9D9D9 배경, #1A1A1A 텍스트
      - 손자 노드(3단계): 흰색 배경, #1A1A1A 텍스트, #1A1A1A 테두리 0.5pt
      - 연결선: 수직+수평 꺾인 선, 0.5pt, #1A1A1A
      - 같은 레벨 노드: 동일 y좌표, 균등 가로 간격
      - 노드 내 텍스트: 상하좌우 가운데 정렬
      - 노드 크기: 레벨별 동일 (루트 > 자식 > 손자 순으로 작아질 수 있음)

  B_org_chart:
    name: "조직도"
    when: "사람/팀 단위의 보고 구조. 직책/이름 표시 필요."
    not_when: "인원 정보 없이 개념적 위계만 있는 경우 → A"
    structure: "최상위 직책 노드, 보고 구조에 따라 하위 노드 분기"
    execution: |
      - 최상위 박스: #1A1A1A 배경, #FFFFFF 텍스트
        직책(Bold) + 이름(Regular) 2줄 구성
      - 하위 박스: #D9D9D9 배경, #1A1A1A 텍스트
      - 연결선: 수직+수평 꺾인 선, 0.5pt, #1A1A1A
      - 점선 연결: 실선 보고 외 점선으로 점선 관계 표시
      - 박스 내 텍스트:
          직책: 13pt Bold, 상하좌우 가운데 정렬
          이름: 11pt Regular, 직책 아래 가운데 정렬

  C_indented_text:
    name: "들여쓰기 텍스트"
    when: "위계가 4단계 이상이거나 항목 수가 많아 도형 배치가 어려울 때."
    not_when: "위계가 3단계 이하 (→ A로 시각화 가능)"
    structure: |
      ● 레벨 1
        ○ 레벨 2
          - 레벨 3
            · 레벨 4
    execution: |
      - 레벨 1: 14pt Bold, #1A1A1A, 들여쓰기 없음
      - 레벨 2: 13pt Regular, #1A1A1A, 들여쓰기 0.3"
      - 레벨 3: 12pt Regular, #1A1A1A, 들여쓰기 0.6"
      - 레벨 4: 11pt Regular, #1A1A1A, 들여쓰기 0.9"
      - 레벨 구분 기호: ●→○→-→· 순서
      - 레벨 간 간격: 레벨 변경 시 0.05" 추가

  D_nested_box:
    name: "중첩 박스"
    when: "포함 관계가 핵심일 때. A가 B를 포함하고, B가 C를 포함하는 구조."
    not_when: "단순 상하 보고 구조(→ A/B) / 4단계 이상 중첩"
    structure: |
      ┌────────────────────┐
      │  외부 개념 A        │
      │  ┌──────────────┐  │
      │  │  내부 개념 B  │  │
      │  │  ┌────────┐  │  │
      │  │  │  핵심C │  │  │
      │  │  └────────┘  │  │
      │  └──────────────┘  │
      └────────────────────┘
    execution: |
      - 최외곽 박스: #D9D9D9 배경, #1A1A1A 테두리 0.5pt
      - 중간 박스: 흰색 배경, #1A1A1A 테두리 0.5pt
      - 최내부 박스: #1A1A1A 배경, #FFFFFF 텍스트
      - 레이블: 각 박스 상단 좌측, 13pt Bold
      - 박스 간 패딩: 0.2" 이상
      - 최대 3단계 중첩

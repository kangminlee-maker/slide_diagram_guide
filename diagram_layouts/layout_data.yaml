# diagram_layouts/data.yaml
# 데이터(Data) 메시지 유형의 레이아웃 패턴 정의
# 참조 위치: slide_diagram_guide.yaml > message_types.data
# DAY1COMPANY | ver 1.0

meta:
  message_type: "data"
  condition: "수치가 핵심이며, 수치 간의 패턴이나 크기를 보여주는 것이 목적이다."

selection_guide:
  decision_axis:
    - question: "수치 1~3개만 강조하면 되는가?"
      answer_yes: "A (Big Number)"
    - question: "시간에 따른 변화를 보여주는가?"
      detail: "데이터 포인트 6개 이하 → B(컬럼 차트) / 7개 이상 → C(선형 차트)"
    - question: "항목 간 크기 또는 순위를 비교하는가?"
      answer_yes: "D (가로 막대 차트)"
    - question: "전체에서 각 항목의 비율을 보여주는가?"
      answer_yes: "E (파이/도넛 차트) — 단, 항목 5개 이하, 차이 명확한 경우만"
    - question: "단계별 증감 누적을 보여주는가?"
      answer_yes: "F (폭포수 차트)"
    - question: "두 변수 간 상관관계나 분포를 보여주는가?"
      answer_yes: "G (산점도)"
    - question: "여러 기준의 강약 패턴을 비교하는가?"
      answer_yes: "H (레이더 차트)"
  forbidden:
    - "파이 차트: 항목 6개 이상 또는 차이 5% 미만 → D(가로 막대)로 대체"
    - "선형 차트: 데이터 포인트 6개 이하 → B(컬럼 차트)로 대체"
    - "레이더 차트: 기준축 2개 이하 또는 9개 이상 → 막대 차트로 대체"
    - "3D 차트, 폭발형 파이, 그라데이션 채우기 전면 금지"

layouts:
  A_big_number:
    name: "Big Number"
    when: "수치 자체가 메시지. 1~3개의 핵심 수치만 강조."
    not_when: "수치 4개 이상 → 차트 사용 / 수치 간 비교가 필요한 경우"
    structure: |
      [수치 1]        [수치 2]        [수치 3]
      레이블          레이블          레이블
      보조 설명       보조 설명       보조 설명
    execution: |
      - 수치: 40~60pt, Bold, #1A1A1A
      - 단위/레이블: 14~16pt, #1A1A1A, 수치 아래
      - 보조 설명: 12pt Regular, #1A1A1A, 레이블 아래
      - 배치: 1개 → 슬라이드 중앙 / 2~3개 → 균등 가로 배치
      - 수치 간 구분선(선택): #D9D9D9 수직선 0.5pt

  B_column_chart:
    name: "세로 막대 차트 (컬럼)"
    when: "시간에 따른 변화. X축이 시간(월/분기/연도). 데이터 포인트 6개 이하."
    not_when: "데이터 포인트 7개 이상 → C(선형 차트)"
    execution: |
      - 막대 색: #1A1A1A (기본) / 강조 막대 1개만 #D9D9D9로 구분 가능
      - 데이터 레이블: 막대 상단, 11pt Bold, #1A1A1A
      - X축 레이블: 10pt, #1A1A1A
      - Y축: 숨김 권장 (데이터 레이블로 대체)
      - 격자선: 수평만, 0.25pt 이하, #D9D9D9
      - 막대 간격: 막대 폭의 40~60%
      - 차트 배경: 흰색, 테두리 없음

  C_line_chart:
    name: "선형 차트"
    when: "장기 추세 또는 예측. 데이터 포인트 7개 이상 또는 연속성 강조."
    not_when: "데이터 포인트 6개 이하 → B(컬럼)"
    execution: |
      - 선 색: #1A1A1A (기본) / 복수 선일 때 명도 차이로 구분
      - 데이터 마커: 원형, 직경 0.08", #1A1A1A
      - 강조 지점: 마커 크기 확대 + 레이블 추가
      - 예측 구간: 점선으로 전환
      - 격자선: 수평만, 0.25pt 이하
      - 범례: 항목 3개 이하면 선 끝에 직접 레이블

  D_bar_chart:
    name: "가로 막대 차트"
    when: "항목 간 크기 비교 또는 순위. 항목명이 길 때."
    not_when: "시간 흐름이 핵심 → B/C"
    execution: |
      - 막대 색: #1A1A1A (기본)
      - 1위/강조 항목: #D9D9D9 또는 #1A1A1A 반전 (1개만)
      - 데이터 레이블: 막대 오른쪽 끝, 11pt Bold, #1A1A1A
      - Y축 레이블(항목명): 10pt, #1A1A1A
      - X축: 숨김 권장 (데이터 레이블로 대체)
      - 정렬: 내림차순 기본

  E_pie_donut:
    name: "파이 / 도넛 차트"
    when: "전체 대비 비율. 항목 5개 이하. 차이가 명확할 때. 합계 100%."
    not_when:
      - "항목 6개 이상 → D(가로 막대)"
      - "항목 간 차이 5% 미만 → D(가로 막대)"
      - "시계열 데이터"
    execution: |
      - 파이: 기본형 / 도넛: 중앙에 합계·핵심 수치 표기할 때
      - 조각 색: #1A1A1A(강조 1개) + #D9D9D9 계열(나머지)
      - 데이터 레이블: 조각 안 또는 밖, 11pt, #1A1A1A (퍼센트 + 항목명)
      - 범례: 3개 이하면 레이블로 대체, 4~5개면 우측 범례
      - 폭발형(explode) 금지

  F_waterfall:
    name: "폭포수 차트"
    when: "시작값에서 항목별 증감을 거쳐 최종값에 도달하는 구조."
    not_when: "단순 합계 비교 → B/D"
    execution: |
      - 시작/끝 막대: #1A1A1A
      - 증가 막대: #D9D9D9
      - 감소 막대: #1A1A1A (다른 명도 또는 패턴으로 구분)
      - 연결선: 점선, 0.5pt
      - 데이터 레이블: 막대 상단/중앙, 11pt Bold
      - 합계 레이블: Bold 처리

  G_scatter:
    name: "산점도"
    when: "두 변수 간 상관관계 또는 분포. 데이터 포인트 10개 이상."
    not_when: "데이터 포인트 10개 미만 → 다른 차트 검토"
    execution: |
      - 점 색: #1A1A1A (기본), 강조 그룹은 #D9D9D9로 구분
      - 추세선(선택): 점선, 0.5pt
      - 축 레이블: 10pt, #1A1A1A
      - 이상값: 레이블 추가
      - 버블 차트(3변수): 버블 크기로 3번째 변수 표현

  H_radar:
    name: "레이더 차트"
    when: "여러 기준의 상대적 강약 패턴 비교. 기준축 3~8개."
    not_when:
      - "기준축 2개 이하 → 막대 차트"
      - "기준축 9개 이상 → 막대 차트"
    execution: |
      - 기준축: 3~8개, 균등 각도 배치
      - 채움 색: #D9D9D9, 50% 투명도
      - 윤곽선: #1A1A1A, 1pt
      - 비교 대상 2개 이상: 명도 차이로 구분
      - 기준축 레이블: 10pt, #1A1A1A
      - 격자선: #D9D9D9, 0.25pt

  common_rules:
    all_charts: |
      - 차트 제목: 슬라이드 Action Title과 동일하거나 생략 (차트 내부 별도 제목 불필요)
      - 차트 배경: 흰색, 테두리 없음
      - 범례: 항목 3개 이하면 직접 레이블로 대체
      - 불필요한 격자선, 테두리, 배경색 제거
      - 강조 데이터 포인트 1개에 한해 #CC3333 적용 가능 (나머지는 #1A1A1A/#D9D9D9)

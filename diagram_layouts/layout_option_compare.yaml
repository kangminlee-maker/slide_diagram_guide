# diagram_layouts/option_compare.yaml
# 옵션 비교표 레이아웃 패턴 정의
# 용도: 3개 이상 선택지를 동일한 기준으로 비교해 의사결정을 지원
# DAY1COMPANY | ver 1.0

meta:
  purpose: >
    2개 항목 비교는 comparison.yaml의 B(2열 비교 박스)로 처리한다.
    이 파일은 3개 이상의 선택지를 다수의 기준으로 비교할 때 사용한다.
    Before/After처럼 시간적 변화가 아니라, 동시에 존재하는 옵션들의 비교다.

selection_guide:
  decision_axis:
    - question: "비교 선택지가 3개 이상이고, 기준이 5개 이상인가?"
      answer_yes: "A (전체 비교 매트릭스)"
    - question: "선택지가 3~5개이고 기준이 4개 이하인가?"
      answer_yes: "B (카드형 비교)"
    - question: "기준별 가중치가 있고 최종 점수를 산출해야 하는가?"
      answer_yes: "C (가중 점수 비교)"
    - question: "추천 옵션 1개를 명확히 강조해야 하는가?"
      answer_yes: "A 또는 B에서 추천 옵션 강조 적용"
  when_not_to_use:
    - "선택지 2개 → comparison.yaml B(2열 비교 박스)"
    - "수치 기반 성능 비교 → data 유형 레이더 차트 또는 막대 차트"
    - "시간적 변화 비교 → comparison.yaml A(Before/After)"

layouts:
  A_full_matrix:
    name: "전체 비교 매트릭스"
    when: "선택지 3개 이상, 기준 5개 이상. 모든 조합을 표로 정리."
    not_when: "선택지 6개 이상 + 기준 8개 이상 → 슬라이드 분리"
    structure: |
      | 기준       | 옵션A | 옵션B | 옵션C |
      |------------|-------|-------|-------|
      | 기준 1     |  ○   |  △   |  ×   |
      | 기준 2     |  △   |  ○   |  ○   |
      | 기준 3     |  ○   |  ×   |  △   |
      | 기준 4     |  ×   |  ○   |  ○   |
      | 기준 5     |  ○   |  △   |  △   |
      | 종합 추천  |       |  ★   |       |
    execution: |
      - 헤더 행(옵션명): #1A1A1A 배경, #FFFFFF 텍스트, 14pt Bold, 가운데 정렬
      - 추천 옵션 헤더: 별도 "추천" 레이블 추가 (12pt, #FFFFFF)
      - 기준 열: #D9D9D9 배경, 13pt Bold, #1A1A1A, 좌측 정렬
      - 평가 셀: 흰색/#D9D9D9 교차, 13pt, #1A1A1A, 가운데 정렬
      - 평가 기호:
          ○ (적합): 텍스트 ○, #1A1A1A Bold
          △ (부분적합): 텍스트 △, #1A1A1A Regular
          × (부적합): 텍스트 ×, #CC3333 Bold
          수치 또는 짧은 텍스트 설명도 허용
      - 종합 추천 행: #D9D9D9 배경, Bold, 추천 옵션 셀만 #1A1A1A 배경/#FFFFFF
      - 열 너비: 기준 열 30% / 옵션 열 균등 분배

  B_card_compare:
    name: "카드형 비교"
    when: "선택지 3~5개, 기준 4개 이하. 각 옵션을 카드로 표현해 직관성 강조."
    not_when: "기준 5개 이상 → A(전체 매트릭스) / 선택지 6개 이상"
    structure: |
      [옵션A 카드]  [옵션B 카드★]  [옵션C 카드]
      - 기준1: ○    - 기준1: ○     - 기준1: △
      - 기준2: △    - 기준2: ○     - 기준2: ×
      - 기준3: ○    - 기준3: ○     - 기준3: ○
    execution: |
      - 카드 배치: 선택지 수에 따라 2~3열 균등 배치
      - 일반 카드: 흰색 배경, #1A1A1A 테두리 0.5pt
      - 추천 카드: #1A1A1A 테두리 2pt + 상단 "추천" 배지
          배지: #1A1A1A 배경, #FFFFFF 텍스트, 11pt Bold
      - 카드 헤더(옵션명): #D9D9D9 배경, 14pt Bold, 가운데 정렬
      - 기준 항목: 13pt Regular, #1A1A1A, 좌측 정렬
      - 평가 기호: 기준 오른쪽, 13pt Bold
          ○: #1A1A1A / △: #1A1A1A / ×: #CC3333
      - 카드 하단 요약(선택): 한 줄 핵심 특징, 12pt Italic, #1A1A1A

  C_weighted_score:
    name: "가중 점수 비교"
    when: "기준별 가중치가 있고 최종 점수를 산출해 객관적 근거를 보여줄 때."
    not_when: "가중치 없이 동등 비교 → A 또는 B"
    structure: |
      | 기준     | 가중치 | 옵션A | 옵션B | 옵션C |
      |----------|--------|-------|-------|-------|
      | 기준 1   |  40%   |  4점  |  3점  |  2점  |
      | 기준 2   |  30%   |  3점  |  5점  |  4점  |
      | 기준 3   |  30%   |  5점  |  3점  |  3점  |
      | 가중 합계|        | 3.9점 | 3.5점 | 2.9점 |
    execution: |
      - 헤더 행: #1A1A1A 배경, #FFFFFF 텍스트, 13pt Bold
      - 가중치 열: #D9D9D9 배경, 13pt Bold, 가운데 정렬
      - 점수 셀: 13pt Regular, #1A1A1A, 가운데 정렬
      - 가중 합계 행: #D9D9D9 배경, 13pt Bold
      - 최고 점수 셀: #1A1A1A 배경, #FFFFFF 텍스트
      - 점수 척도: 1~5점 또는 1~10점 중 하나로 통일, 슬라이드 하단에 척도 명시
      - 열 너비: 기준 25% / 가중치 15% / 옵션 열 균등 분배

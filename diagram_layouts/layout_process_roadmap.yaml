# ./process_roadmap.yaml
# 로드맵 레이아웃 패턴 정의 (process.yaml의 D_roadmap 확장)
# 용도: 단계 + 기간 + 마일스톤을 동시에 표현하는 중장기 계획 도식
# DAY1COMPANY | ver 1.0

meta:
  purpose: >
    process.yaml의 D_roadmap은 기본 개요를 제공한다.
    이 파일은 로드맵의 세부 변형(가로 간트, 수직 단계, 분기별 타일)을
    추가로 정의한다. 기간이 핵심이고 다수 항목이 병렬로 진행될 때 사용한다.
  base_ref: "./process.yaml > D_roadmap"

selection_guide:
  decision_axis:
    - question: "여러 항목이 병렬로 진행되고 기간 겹침을 보여야 하는가?"
      answer_yes: "A (간트형 로드맵)"
    - question: "단계가 순차적이고 각 단계의 목표·산출물을 강조해야 하는가?"
      answer_yes: "B (수직 단계형 로드맵)"
    - question: "분기/월 단위로 항목을 타일 배치해 전체 계획을 보여야 하는가?"
      answer_yes: "C (타일형 로드맵)"
    - question: "마일스톤(특정 시점의 이정표)이 핵심이고 세부 기간은 부차적인가?"
      answer_yes: "process.yaml의 C_timeline 사용"
  when_not_to_use:
    - "기간 정보가 없는 순차 흐름 → process.yaml A(가로 흐름도)"
    - "단계가 2개 이하 → process.yaml A 또는 C"
    - "날짜가 핵심이고 항목 수가 적은 경우 → process.yaml C(타임라인)"

layouts:
  A_gantt:
    name: "간트형 로드맵"
    when: "여러 항목(트랙)이 병렬로 진행. 기간 겹침과 의존 관계가 중요."
    not_when: "항목이 순차적으로만 진행되는 경우 → B"
    structure: |
      항목명   | 1월 | 2월 | 3월 | 4월 | 5월 | 6월 |
      트랙 A   |█████|█████|     |     |     |     |
      트랙 B   |     |████ |████ |████ |     |     |
      트랙 C   |     |     |     |██   |████ |████ |
                              ◆ 마일스톤
    execution: |
      - 기간 헤더 행: #1A1A1A 배경, #FFFFFF 텍스트, 13pt Bold, 가운데 정렬
      - 트랙명 열: 좌측, 13pt Bold, #1A1A1A, 고정 폭 (전체의 20~25%)
      - 진행 바:
          일반 트랙: #D9D9D9
          핵심/강조 트랙: #1A1A1A
          완료 트랙: #D9D9D9 (진하게)
      - 마일스톤: ◆ 텍스트 기호, 14pt Bold, #1A1A1A, 해당 셀 중앙
      - 마일스톤 레이블: 기호 아래 또는 옆, 11pt, #1A1A1A
      - 행 배경: 흰색/#D9D9D9 교차
      - 행 높이: 0.35~0.45"
      - 최대 트랙 수: 6개 (초과 시 슬라이드 분리)

  B_vertical_phase:
    name: "수직 단계형 로드맵"
    when: "단계가 순차적이고 각 단계의 목표·산출물·기간을 세로로 나열."
    not_when: "병렬 진행 항목이 있는 경우 → A(간트형)"
    structure: |
      [단계 1: 1~2월]
      목표: ...  산출물: ...
          ↓
      [단계 2: 3~4월]
      목표: ...  산출물: ...
          ↓
      [단계 3: 5~6월]
      목표: ...  산출물: ...
    execution: |
      - 단계 헤더 박스: #1A1A1A 배경, #FFFFFF 텍스트, 14pt Bold
          단계명 + 기간을 한 줄에 표기
      - 내용 영역: #D9D9D9 배경, 12pt Regular, #1A1A1A
          목표·산출물·담당을 들여쓰기로 구분
      - 연결 화살표: 수직 ↓, #1A1A1A 1pt
      - 단계 수: 3~5개 (초과 시 2열로 나눠 배치)
      - 박스 높이: 내용에 따라 유동 (최소 0.8")

  C_tile_roadmap:
    name: "타일형 로드맵"
    when: "분기/월 단위로 항목을 격자에 배치해 전체 계획의 밀도를 보여줄 때."
    not_when: "기간 겹침 표현 필요 → A / 단계 의존 관계 중요 → B"
    structure: |
      |  1분기       |  2분기       |  3분기       |  4분기       |
      |--------------|--------------|--------------|--------------|
      | 항목 A       | 항목 B       | 항목 C       | 항목 D       |
      | 항목 E       |              | 항목 F       | 항목 G       |
    execution: |
      - 분기/월 헤더: #1A1A1A 배경, #FFFFFF 텍스트, 13pt Bold, 가운데 정렬
      - 타일(항목 셀): #D9D9D9 배경, #1A1A1A 테두리 0.5pt
          항목명: 13pt Bold, 상하좌우 가운데 정렬
          부가 정보(담당자 등): 11pt Regular, 항목명 아래
      - 강조 항목: #1A1A1A 배경, #FFFFFF 텍스트
      - 빈 셀: 흰색 배경 (명시적으로 비워둠)
      - 마일스톤 표시: 셀 우상단 ◆ 기호, 11pt, #1A1A1A
      - 열 수: 분기 기준 4열 / 월 기준 최대 6열

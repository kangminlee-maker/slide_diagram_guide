# diagram_layouts/scorecard.yaml
# 스코어카드 레이아웃 패턴 정의
# 용도: 여러 기준으로 항목을 평가·점수화하여 현황을 한눈에 파악
# DAY1COMPANY | ver 1.0

meta:
  purpose: >
    스코어카드는 다수의 KPI나 평가 항목을 하나의 슬라이드에서
    목표 대비 현재 상태를 보여주는 레이아웃이다.
    수치 비교(data 유형)와 다르며, 달성 여부·상태 판단이 핵심이다.

selection_guide:
  decision_axis:
    - question: "KPI 항목이 6개 이상이고 각 항목의 현재값·목표값을 한눈에 보여줘야 하는가?"
      answer_yes: "A (KPI 테이블 스코어카드)"
    - question: "4~6개 항목을 카드 단위로 시각적으로 강조해서 보여줘야 하는가?"
      answer_yes: "B (카드형 스코어카드)"
    - question: "각 항목의 달성률(%)을 진행 막대로 직관적으로 표현해야 하는가?"
      answer_yes: "C (진행률 스코어카드)"
    - question: "항목들이 달성·진행중·미달 3단계 상태로만 구분되는가?"
      answer_yes: "D (신호등 스코어카드)"
  when_not_to_use:
    - "수치 자체의 변화·비교가 핵심 → data 유형 차트"
    - "항목 간 우열 순위가 핵심 → data 유형 가로 막대 차트"
    - "KPI가 2~3개뿐 → data 유형 Big Number"

layouts:
  A_kpi_table:
    name: "KPI 테이블 스코어카드"
    when: "KPI 항목 6개 이상. 목표값·현재값·달성률·상태를 표로 정리."
    not_when: "항목 5개 이하 → B(카드형) 또는 C(진행률)"
    structure: |
      | KPI 항목 | 목표 | 현재 | 달성률 | 상태 |
      |----------|------|------|--------|------|
      | 항목 A   | 100  |  87  |  87%   |  △  |
      | 항목 B   |  50  |  52  | 104%   |  ○  |
    execution: |
      - 헤더 행: #1A1A1A 배경, #FFFFFF 텍스트, 13pt Bold, 가운데 정렬
      - 항목 열: 13pt Bold, #1A1A1A, 좌측 정렬
      - 수치 셀: 13pt Regular, #1A1A1A, 가운데 정렬
      - 상태 셀: 텍스트 기호 사용 (○달성 / △진행중 / ×미달), 14pt Bold
      - 상태 색상: 기호 텍스트만 색상 구분
          ○ 달성: #1A1A1A Bold
          △ 진행중: #1A1A1A Regular
          × 미달: #CC3333 Bold
      - 행 배경: 흰색/#D9D9D9 교차
      - 열 너비: 항목 35% / 목표 15% / 현재 15% / 달성률 15% / 상태 20%

  B_card_scorecard:
    name: "카드형 스코어카드"
    when: "KPI 항목 4~6개. 각 항목을 카드 단위로 시각적으로 강조."
    not_when: "항목 7개 이상 → A(KPI 테이블)"
    structure: |
      [카드1: KPI명 / 현재값 / 목표 / 상태]
      [카드2: KPI명 / 현재값 / 목표 / 상태]
      [카드3: KPI명 / 현재값 / 목표 / 상태]
    execution: |
      - 카드 배치: 2열 또는 3열 그리드
      - 카드 배경: 흰색, #1A1A1A 테두리 0.5pt
      - 달성 카드: #D9D9D9 배경 (연한 강조)
      - 미달 카드: 좌측 #CC3333 세로선 2pt 추가
      - 카드 내 구성:
          KPI명: 13pt Bold, #1A1A1A, 상단 좌측
          현재값: 28~36pt Bold, #1A1A1A, 중앙
          목표값: 11pt Regular, #1A1A1A, 현재값 아래
          상태 기호: 우상단, 14pt Bold
      - 카드 높이: 1.2~1.5"

  C_progress_scorecard:
    name: "진행률 스코어카드"
    when: "각 항목의 달성률(%)을 진행 막대로 직관적으로 표현해야 할 때."
    not_when: "절대값 수치가 중요한 경우 → A(KPI 테이블)"
    structure: |
      항목 A  [████████░░░░] 80%  목표: 100
      항목 B  [████████████] 100% 목표: 50  ○
      항목 C  [████░░░░░░░░] 40%  목표: 80  ×
    execution: |
      - 항목명: 13pt Bold, #1A1A1A, 좌측, 고정 폭 (전체 너비의 25%)
      - 진행 바 배경: #D9D9D9, 높이 0.2"
      - 진행 바 채움:
          100% 이상: #1A1A1A
          70~99%: #1A1A1A (60% 불투명)
          70% 미만: #CC3333
      - 달성률 수치: 바 오른쪽, 12pt Bold, #1A1A1A
      - 목표값: 달성률 오른쪽, 11pt Regular, #1A1A1A
      - 상태 기호: 맨 우측, 12pt Bold
      - 행 간격: 0.15~0.2"

  D_traffic_light:
    name: "신호등 스코어카드"
    when: "항목들이 달성·진행중·미달 3단계 상태로만 구분되고 수치보다 상태가 핵심."
    not_when: "수치나 달성률이 중요한 경우 → A 또는 C"
    structure: |
      | 항목       | 담당 | 상태 | 비고       |
      |------------|------|------|------------|
      | 항목 A     | 홍길동 | ○  | 예정대로    |
      | 항목 B     | 김철수 | △  | 1주 지연    |
      | 항목 C     | 이영희 | ×  | 리소스 부족 |
    execution: |
      - 상태 표기: 텍스트 기호 사용
          ○ (달성/정상): #1A1A1A Bold
          △ (진행중/주의): #1A1A1A Regular
          × (미달/위험): #CC3333 Bold
      - 상태 셀 배경: 상태에 따라 배경 구분
          ○: 흰색
          △: #D9D9D9
          ×: 흰색 (× 텍스트만 #CC3333)
      - 텍스트: 상태 기호 외 모두 #1A1A1A
      - 비고: 12pt Regular, #1A1A1A, 좌측 정렬

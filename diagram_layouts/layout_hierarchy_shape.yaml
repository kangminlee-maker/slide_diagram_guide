# diagram_layouts/hierarchy_shape.yaml
# 피라미드 / 펀넬 레이아웃 패턴 정의
# 용도: 층위별 중요도·규모·우선순위가 다를 때의 형태적 위계 표현
# DAY1COMPANY | ver 1.0

meta:
  purpose: >
    트리/조직도(hierarchy.yaml)가 연결 관계를 보여주는 구조라면,
    이 파일은 층위별 크기·중요도·순서를 형태(삼각형/깔때기)로 보여주는 구조다.
    수치 없이 순서와 층위 자체가 메시지일 때 사용한다.

selection_guide:
  decision_axis:
    - question: "하위 층이 상위 층을 지탱하는 기반 구조인가? (아래가 넓을수록 기반)"
      answer_yes: "A (피라미드 — 정방향)"
      example: "Maslow 욕구 단계, 조직 성숙도 모델"
    - question: "위에서 아래로 갈수록 수가 줄어드는 선별/전환 구조인가?"
      answer_yes: "B (펀넬 — 역방향 피라미드)"
      example: "영업 파이프라인, 고객 전환 단계"
    - question: "층위별 중요도는 다르지만 크기 비율이 아닌 순위·우선순위만 표현하는가?"
      answer_yes: "C (계단형 피라미드)"
      example: "전략 우선순위, AI 전환 단계별 목표"
    - question: "층위에 수치(비율, 인원 수)가 있고 면적으로 표현해야 하는가?"
      answer_yes: "data 유형으로 전환 (누적 막대 차트 또는 면적 차트)"
  when_not_to_use:
    - "층위 간에 의존 관계나 연결이 없는 단순 목록 → list 유형"
    - "층위가 2개 이하 → 박스 나열(list) 또는 비교(comparison)로 처리"
    - "층위가 7개 이상 → 가독성 붕괴, 단계 통합 후 재설계"
    - "수치 기반 비율 표현 → data 유형의 파이/막대 차트"

layouts:
  A_pyramid:
    name: "피라미드 (정방향)"
    when: "하위가 기반이고 상위가 정점인 위계. 아래가 넓을수록 더 기본적·대규모."
    not_when: "전환율 감소 구조 → B(펀넬) / 순위만 표현 → C(계단형)"
    structure: "정삼각형을 수평으로 N등분. 꼭짓점이 최상위 층."
    execution: |
      - 레이어 수: 3~6개 (7개 이상 금지)
      - 색상: 꼭짓점(최상위) #1A1A1A → 기저(최하위) #D9D9D9 순으로 명도 단계
      - 레이어 내 텍스트: 상하좌우 가운데 정렬, 13~14pt Bold
      - 레이어 레이블(외부): 각 층 옆에 리더선으로 연결, 12pt, #1A1A1A
      - 비율 표현 시: 실제 비율에 맞게 각 층의 높이 조정
      - 비율 무관 시: 균등 높이 (순위/우선순위만 표현)
      - 3D 효과, 그라데이션 금지

  B_funnel:
    name: "펀넬 (역방향 피라미드)"
    when: "위에서 아래로 갈수록 수가 줄어드는 선별·전환·필터링 구조."
    not_when: "단계가 순서대로 진행되는 프로세스 → process 유형"
    structure: "역삼각형을 수평으로 N등분. 꼭짓점이 최하위 최종 단계."
    execution: |
      - 레이어 수: 3~6개
      - 색상: 최상단(최대 규모) #D9D9D9 → 최하단(최소·핵심) #1A1A1A
      - 각 레이어에 수치(인원 수, %, 건수) 병기 가능: 12pt Bold
      - 레이어 텍스트: 상하좌우 가운데 정렬
      - 단계명: 레이어 내부 또는 좌측 외부
      - 드롭오프(이탈) 강조 시: 레이어 사이에 감소량 표기 가능
      - 3D 효과, 그라데이션 금지

  C_step_pyramid:
    name: "계단형 피라미드"
    when: "층위별 순위·우선순위를 표현. 크기 비율 없이 단계 순서만 중요할 때."
    not_when: "실제 비율 표현이 필요한 경우 → A(피라미드) / 수치 중심 → data 유형"
    structure: "왼쪽 또는 오른쪽에서 계단식으로 확장되는 박스 배치."
    execution: |
      - 단계 수: 3~5개
      - 각 단계: 동일 높이 박스, 너비만 단계별로 증가
      - 1단계(최우선): 가장 좁은 박스, #1A1A1A 배경, #FFFFFF 텍스트
      - 하위 단계: 점점 넓어지는 박스, #D9D9D9 배경, #1A1A1A 텍스트
      - 단계 번호: 박스 좌측, 14pt Bold
      - 단계명: 박스 내부, 상하좌우 가운데 정렬
      - 설명 텍스트: 박스 우측 또는 하단, 12pt Regular

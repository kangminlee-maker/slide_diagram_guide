# diagram_layouts/relationship.yaml
# 관계(Relationship) 메시지 유형의 레이아웃 패턴 정의
# 참조 위치: slide_diagram_guide.yaml > message_types.relationship
# DAY1COMPANY | ver 1.0

meta:
  message_type: "relationship"
  condition: "항목들이 겹치거나 연결되며, 상호 영향을 준다."

selection_guide:
  decision_axis:
    - question: "항목들이 하나의 순환 구조를 이루는가?"
      answer_yes: "A (사이클)"
    - question: "항목들 사이에 겹치는 영역이 있고 그 교차점이 핵심인가?"
      answer_yes: "B (벤 다이어그램)"
    - question: "하나의 중심 항목이 여러 항목과 연결되는 구조인가?"
      answer_yes: "D (방사형)"
    - question: "다수 항목 간에 다대다 연결이 있는가?"
      answer_yes: "C (네트워크)"
    - question: "관계가 일방향인가?"
      answer_yes: "process 유형으로 재분류"
  forbidden:
    - "벤 다이어그램에 원 4개 이상 → C(네트워크)로 전환"
    - "일방향 관계를 사이클/네트워크로 표현 → process 유형으로 재분류"
    - "노드 수 8개 이상의 네트워크 → 슬라이드 분리"

layouts:
  A_cycle:
    name: "사이클"
    when: "항목들이 순환 구조를 이룰 때. 끝이 시작으로 돌아오는 피드백 루프."
    not_when: "방향이 일방향인 경우 → process / 중심 허브가 있는 경우 → D"
    structure: |
        [A] → [B]
         ↑       ↓
        [D] ← [C]
    execution: |
      - 노드: 원형 또는 사각형, 원형 배치
      - 노드 수: 3~5개
      - 화살표 방향: 시계 방향 기본
      - 노드 배경:
          일반: #D9D9D9
          강조(1개): #1A1A1A, #FFFFFF 텍스트
      - 연결 화살표: #1A1A1A, 1pt, 곡선 또는 직선
      - 노드 텍스트: 13pt Bold, 상하좌우 가운데 정렬
      - 노드 간 균등 각도 배치

  B_venn:
    name: "벤 다이어그램"
    when: "두 개 이상 집합의 교차점(공통 영역)이 메시지의 핵심일 때."
    not_when: "원 4개 이상 → C / 겹치는 내용이 없거나 불명확한 경우"
    structure: |
      (   A   (  공통  )   B   )
    execution: |
      - 원 수: 2~3개 (3개 초과 금지)
      - 원 배경: 반투명 (각 집합은 서로 다른 명도로 구분)
        2개: 원A #D9D9D9 / 원B #1A1A1A(30% 투명)
        3개: 원마다 단계적 명도 차이
      - 교차 영역: 가장 진한 배경, 핵심 키워드만 배치
      - 집합 레이블: 원 바깥 또는 비교차 영역, 14pt Bold, #1A1A1A
      - 교차 레이블: 12pt Bold, #1A1A1A
      - 원 테두리: 없음 (배경색으로만 구분)

  C_network:
    name: "네트워크"
    when: "다수 항목 간 다대다 연결이 있을 때. 연결 패턴 자체가 메시지."
    not_when: "중심 허브가 명확한 경우 → D / 노드 8개 이상(슬라이드 분리)"
    structure: |
      [A]──[B]
       |  ╲  |
      [C]──[D]
    execution: |
      - 노드: 원형 또는 사각형, 위치는 관계 밀도에 따라 배치
      - 중요도 높은 노드: #1A1A1A 배경, #FFFFFF 텍스트, 크기 확대
      - 일반 노드: #D9D9D9 배경, #1A1A1A 텍스트
      - 연결선:
          강한 관계: #1A1A1A, 1.5pt
          약한 관계: #D9D9D9, 0.5pt
          방향 있는 관계: 화살표 추가
      - 노드 레이블: 12pt Bold, 노드 내부 가운데 정렬
      - 노드 수: 최대 7개

  D_radial:
    name: "방사형"
    when: "하나의 중심 개념이 여러 하위 개념과 연결될 때. 중심-주변 구조."
    not_when: "중심 없이 모든 항목이 대등한 경우 → C(네트워크)"
    structure: "중심 노드를 중앙에, 주변 노드를 균등 각도로 배치"
    execution: |
      - 중심 노드: #1A1A1A 배경, #FFFFFF 텍스트, 크기 1.5~2배
      - 주변 노드: #D9D9D9 배경, #1A1A1A 텍스트
      - 연결선: #1A1A1A, 0.5~1pt (방향 없음 기본)
      - 주변 노드 수: 3~6개
      - 주변 노드 배치: 중심에서 균등 각도
      - 텍스트: 13pt Bold, 상하좌우 가운데 정렬

# ./comparison.yaml
# 비교(Comparison) 메시지 유형의 레이아웃 패턴 정의
# 참조 위치: slide_diagram_guide.yaml > message_types.comparison
# DAY1COMPANY | ver 1.0
# 주의: Before/After 상세 레이아웃은 before_after.yaml을 별도 참조

meta:
  message_type: "comparison"
  condition: "둘 이상의 항목이 특정 기준에서 차이를 보인다."

selection_guide:
  decision_axis:
    - question: "변경 전후 상태를 비교하는가? (시간적 변화)"
      answer_yes: "A (Before/After)"
      detail: "상세 레이아웃은 ./before_after.yaml 참조"
    - question: "여러 선택지 중 하나를 고르는 비교인가?"
      answer_yes: "D (옵션 비교표)"
    - question: "두 항목을 여러 기준으로 나란히 비교하는가?"
      answer_yes: "B (2열 비교 박스)"
    - question: "두 기준축으로 전략적 포지셔닝을 보여주는가?"
      answer_yes: "C (2×2 매트릭스)"
    - question: "수치 차이가 메시지의 핵심인가?"
      answer_yes: "data 유형으로 전환 (막대 차트)"
  forbidden:
    - "비교 기준(축)이 불명확한 2×2 매트릭스 → B 또는 D로 전환"
    - "4분면 중 2개 이상이 비어있는 2×2 매트릭스 → B 또는 D로 전환"
    - "비교 항목 수 4개 이상에서 2열 비교 박스 사용 → D(옵션 비교표)로 전환"

layouts:
  A_before_after:
    name: "Before/After"
    when: "시간적 변화 또는 개선 전후 상태 비교."
    layout_ref: "./before_after.yaml"
    summary: "6가지 세부 구조(스윔레인/브리지/갭/테이블/스택/델타) 중 상황에 맞게 선택"

  B_two_column:
    name: "2열 비교 박스"
    when: "두 항목(A vs B)을 같은 기준으로 나란히 비교할 때. 비교 기준이 3~5개."
    not_when: "비교 항목 3개 이상 → D(옵션 비교표) / 수치 차이가 핵심 → 막대 차트"
    structure: |
      | 항목 A       | 항목 B       |
      |--------------|--------------|
      | 기준1 내용   | 기준1 내용   |
      | 기준2 내용   | 기준2 내용   |
    execution: |
      - 헤더 행: #1A1A1A 배경, #FFFFFF 텍스트, 14pt Bold, 상하좌우 가운데 정렬
      - 기준 행: 홀짝 교차 배경(흰색/#D9D9D9)
      - 우위 항목 셀: #1A1A1A 배경, #FFFFFF 텍스트로 강조 (선택적)
      - 셀 내 텍스트: 완결 문장이면 상하 가운데 + 좌측 정렬
      - 열 너비: 각 4.0", 간격 0.2"
      - 기준 레이블(좌측 열 추가 시): 폭 1.5", #D9D9D9 배경

  C_matrix_2x2:
    name: "2×2 매트릭스"
    when: "X축·Y축 두 기준으로 4개 포지션 중 하나에 항목을 배치할 때."
    not_when:
      - "기준축이 불명확한 경우"
      - "4분면 중 2개 이상이 비어있는 경우"
      - "단순 항목 비교(→ B 또는 D)"
    structure: |
      높음-낮음 Y축, 높음-낮음 X축 기준 4분면 배치
      1사분면(우상), 2사분면(좌상), 3사분면(좌하), 4사분면(우하)
    execution: |
      - 사분면 배경: 흰색 (강조 사분면 1개만 #D9D9D9 또는 #1A1A1A)
      - 사분면 테두리: #1A1A1A 0.5pt
      - 축 레이블: 10pt Bold, #1A1A1A, 축 끝에 배치
      - 항목 레이블: 14pt, #1A1A1A, 해당 사분면 내 중앙 배치
      - 강조 사분면: #1A1A1A 배경, #FFFFFF 텍스트 (1개만)
      - 전체 매트릭스 크기: 콘텐츠 영역의 70~80% 사용

  D_option_compare:
    name: "옵션 비교표"
    when: "3개 이상 선택지를 같은 기준으로 비교해 의사결정에 활용할 때."
    not_when: "선택지 2개 → B(2열 비교 박스) / 시간적 변화 비교 → A"
    structure: |
      | 기준     | 옵션A | 옵션B | 옵션C |
      |----------|-------|-------|-------|
      | 기준 1   |  ○   |  △   |  ×   |
      | 기준 2   |  △   |  ○   |  ○   |
      | 기준 3   |  ×   |  ○   |  △   |
      | 종합 추천 |       |  ★   |       |
    execution: |
      - 헤더 행(옵션명): #1A1A1A 배경, #FFFFFF 텍스트, 14pt Bold, 가운데 정렬
      - 기준 열: #D9D9D9 배경, 13pt Bold, #1A1A1A, 좌측 정렬
      - 일반 셀: 흰색/회색 교차, 13pt, #1A1A1A, 상하좌우 가운데 정렬
      - 추천 옵션 열: 헤더에 #1A1A1A 배경 강조 + 별도 "추천" 레이블
      - 평가 기호:
          ○(적합): 텍스트로 표기
          △(부분적합): 텍스트로 표기
          ×(부적합): 텍스트로 표기
          기호 대신 짧은 텍스트 설명도 허용
      - 종합 추천 행: 슬라이드 하단, #D9D9D9 배경, Bold
      - 열 너비: 기준 열 25% / 옵션 열 균등 분배
